spring:
  application:
    name: FileProcessingPlatform
  datasource:
      url: ${SQL_DATABASE_URL}
      username: ${SQL_DATABASE_USERNAME}
      password: ${SQL_DATABASE_PASSWORD}
      driver-class-name: org.postgresql.Driver
      Hikari:
        initialization-fail-timeout: -1
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        validation-timeout: 5000
        keepalive-time: 300000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
app:
  folders:
    base: C:/Users/kwsta/Desktop/projects/FileProcessingPlatform
    input: ${app.folders.base}/data/input
    output: ${app.folders.base}/data/output
    archive: ${app.folders.base}/data/input/archive
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    issuer: file-processing-platform
  file-processing:
    max-file-size-mb: 25
    allowed-extensions:
      - csv
      - json
      - xml
  mq:
    queue-in: DEV.QUEUE.1
    queue-out: DEV.QUEUE.2
ibm:
  mq:
    queueManager: QM1
    channel: DEV.APP.SVRCONN
    connName: localhost(1414)
    user: app
    password: passw0rd
    applicationName: ${spring.application.name}
thread:
  virtualThreads:
    enabled: true