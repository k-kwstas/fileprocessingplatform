name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  SQL_DATABASE_URL: ${{ vars.SQL_DATABASE_URL }}
  SQL_DATABASE_USERNAME: ${{ vars.SQL_DATABASE_USERNAME }}
  SQL_DATABASE_PASSWORD: ${{ secrets.SQL_DATABASE_PASSWORD }}
  BASE_PATH: ${{ github.workspace }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  MQ_APP_PASSWORD: ${{ secrets.MQ_APP_PASSWORD }}

jobs:
  build:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Compile application and tests
        run: .\gradlew.bat --no-daemon compileJava compileTestJava
